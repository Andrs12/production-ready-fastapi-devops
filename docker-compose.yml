services:
  postgres:
    image: postgres:16-alpine
    container_name: devops_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_DB: devopslab
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - backend_network

  redis:
    image: redis:7-alpine
    container_name: devops_redis
    ports:
      - "6379:6379"
    networks:
      - backend_network

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: devops_api
    ports:
      - "8000:8000"
    environment:
      # OJO: Cambiamos 'localhost' por el nombre de los servicios de Docker Compose
      - DATABASE_URL=postgresql+asyncpg://postgres:postgrespassword@postgres:5432/devopslab
      - REDIS_URL=redis://redis:6379/0
      - PORT=8000
    depends_on:
      - postgres
      - redis
    networks:
      - backend_network

volumes:
  postgres_data:

networks:
  backend_network:
    driver: bridge
