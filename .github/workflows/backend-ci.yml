name: Backend Production CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-and-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del codigo
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8

      - name: Ejecutar Linter (Flake8)
        run: |
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      - name: Ejecutar Test con pytest
        run: |
          pytest -v

  security-scan:
    needs: test-and-lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Escanear repositorio (FS) con Trivy
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true 
          severity: 'CRITICAL,HIGH'

  docker-build:
    needs: security-scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      # Setup Buildx es obligatorio para poder usar las funciones avanzadas de caché (gha)
      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Construimos la imagen LOCALMENTE primero para que Trivy pueda escanearla por dentro
      - name: Construir imagen Docker (Local)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false 
          tags: backend-api:local
          load: true # Esto inyecta la imagen directamente en el demonio Docker del Runner de GitHub
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Pasamos Trivy pero esta vez apuntando a la IMAGEN CONTAINERizada, no a los archivos sueltos
      - name: Escanear Imagen Docker con Trivy
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: 'image'
          image-ref: 'backend-api:local'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          severity: 'CRITICAL,HIGH'
